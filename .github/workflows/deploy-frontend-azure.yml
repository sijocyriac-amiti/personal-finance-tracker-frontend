name: Deploy Frontend To Azure

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log In To Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve Backend URL
        id: backend
        shell: bash
        run: |
          fqdn=$(az containerapp show \
            --name "${{ secrets.AZURE_BACKEND_CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query properties.configuration.ingress.fqdn \
            -o tsv)
          echo "api_base_url=https://${fqdn}/api" >> "$GITHUB_OUTPUT"

      - name: Log In To Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}
          username: ${{ secrets.AZURE_ACR_USERNAME }}
          password: ${{ secrets.AZURE_ACR_PASSWORD }}

      - name: Build And Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          build-args: |
            VITE_API_BASE_URL=${{ steps.backend.outputs.api_base_url }}
          push: true
          tags: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}/personal-finance-tracker-frontend:${{ github.sha }}

      - name: Update Frontend Container App
        run: |
          az containerapp update \
            --name "${{ secrets.AZURE_FRONTEND_CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --image "${{ secrets.AZURE_ACR_LOGIN_SERVER }}/personal-finance-tracker-frontend:${{ github.sha }}"
